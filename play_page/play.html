<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Museum Guesser</title>
    <link rel="stylesheet" href="play.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Concert+One&family=Dekko&family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=IM+Fell+DW+Pica+SC&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- You code goes here-->
    <div id="headerExtender">
      <header id="mainHeader">
        <div class="headerItem" id="navButtons">
          <a class="navButton" id="homeButton" href="../index.html">HOME</a>
          <a class="navButton" id="guideButton" href="../guide_page/guide.html">GUIDE & RESOURCES</a>
        </div>
      </header>
    </div>
    <p id="titleText">MUSEUM GUESSER</p>
    <div id="gameBody">
      <br><br><br>
      <p id="score">Score: 0/10 correct</p>
      <p id="remainingPieces">Pieces Left: 10/10</p>
      <select id="museumSelect">
        <button><selectedcontent></selectedcontent></button>
        <option value="selectMuseum">
          <span class="icon" aria-hidden="true">🏛️</span>
          <span class="option-label">Select a Museum</span>
        </option>
        <option value="met">
          <span class="icon" aria-hidden="true">🖼️</span>
          <span class="option-label">The Metropolitan Museum of Art</span>
        </option>
        <option value="vna">
          <span class="icon" aria-hidden="true">👑</span>
          <span class="option-label">The Victoria and Albert Museum</span>
        </option>
        <option value="nan">
          <span class="icon" aria-hidden="true">❓</span>
          <span class="option-label">Random</span>
        </option>
      </select>
      <img id="artImage" src="../global_assets/Empty-frame.png" alt="No Piece Selected" />
      <br><br>
      <button id="selectPieceButton">Pick museum piece</button>
      <br>
      <label for="attribution">Enter attribution:</label>
      <input type="text" id="attribution" />
      <br>
      <p id="currentStreak">Current Streak: 0</p>
    </div>
    <!-- Imported because index.js hates it when these aren't here -->
      <div id="userLogin">
        <div class="auth-fields-and-buttons">
            <input id="email-input" type="email" placeholder="Email">
            <input id="password-input" type="password" placeholder="Password">
            
            <button id="sign-in-btn" class="primary-btn">Sign in</button>
            <button id="create-account-btn" class="secondary-btn">Create Account</button>
        </div>
      </div>
        <div class="headerItem" id="userImg">
          <img id="pfp" />
        </div>
    <script src="play.js" type="module"></script>
  </body>
</html>
